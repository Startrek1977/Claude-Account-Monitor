name: .NET Desktop CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install MAUI workload
        run: dotnet workload install maui --ignore-failed-sources

      - name: Restore
        run: dotnet restore src/Claude-Account-Monitor.sln

      - name: Test
        run: dotnet test src/Claude-Account-Monitor.Tests/Claude-Account-Monitor.Tests.csproj -c ${{ matrix.configuration }} --no-restore

      - name: Publish (Windows)
        run: dotnet publish src/Claude-Account-Monitor/Claude-Account-Monitor.csproj -c ${{ matrix.configuration }} -o ${{ github.workspace }}\publish\${{ matrix.configuration }} --no-restore

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: ClaudeAccountMonitor-Windows-${{ matrix.configuration }}
          path: ${{ github.workspace }}\publish\${{ matrix.configuration }}
          if-no-files-found: error
