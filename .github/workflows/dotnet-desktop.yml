name: .NET Desktop CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui --ignore-failed-sources

      - name: Restore
        run: dotnet restore src/Claude-Account-Monitor.sln

      - name: Test
        run: dotnet test src/Claude-Account-Monitor.Tests/Claude-Account-Monitor.Tests.csproj -c ${{ matrix.configuration }}

      - name: Publish (Windows)
        run: dotnet publish src/Claude-Account-Monitor/Claude-Account-Monitor.csproj -c ${{ matrix.configuration }} -o ${{ github.workspace }}\publish\${{ matrix.configuration }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ClaudeAccountMonitor-Windows-${{ matrix.configuration }}
          path: ${{ github.workspace }}\publish\${{ matrix.configuration }}
          if-no-files-found: error
